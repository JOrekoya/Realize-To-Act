<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complete Your Profile - Realize to Act</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/auth.css">
  <style>
    .profile-setup-container {
      max-width: 600px;
      margin: 60px auto;
      padding: 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .profile-setup-container h1 {
      color: #A34BA3;
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
    }
    .profile-setup-container p {
      text-align: center;
      color: #5E5E5E;
      margin-bottom: 32px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="profile-setup-container">
    <h1>Complete Your Profile</h1>
    <p>Tell us more about your organization to get started</p>

    <form id="profileSetupForm" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name*</label>
          <input type="text" id="firstName" name="firstName" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name*</label>
          <input type="text" id="lastName" name="lastName" required>
        </div>
      </div>

      <div class="form-group">
        <label for="organizationName">Organization Name*</label>
        <input type="text" id="organizationName" name="organizationName" placeholder="e.g., Lincoln Elementary School" required>
      </div>

      <div class="form-group">
        <label for="organizationType">Organization Type*</label>
        <select id="organizationType" name="organizationType" required>
          <option value="">Select type...</option>
          <option value="school">School District</option>
          <option value="nonprofit">Nonprofit</option>
        </select>
      </div>

      <div class="form-group">
        <label for="address">Address*</label>
        <input type="text" id="address" name="address" placeholder="Street address" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">City*</label>
          <input type="text" id="city" name="city" required>
        </div>
        <div class="form-group">
          <label for="state">State*</label>
          <input type="text" id="state" name="state" placeholder="e.g., CA" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="zipCode">ZIP Code*</label>
          <input type="text" id="zipCode" name="zipCode" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number*</label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 123-4567" required>
        </div>
      </div>

      <div class="form-group">
        <label for="description">About Your Organization</label>
        <textarea id="description" name="description" rows="4" placeholder="Tell us about your organization and what resources you need or can provide..."></textarea>
      </div>

      <button type="submit" class="btn-auth btn-primary">Complete Profile</button>
    </form>
  </div>

  <script type="module" src="js/profile-setup.js"></script>
</body>
</html>
